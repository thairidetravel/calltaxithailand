<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calling Taxi | บริการรถรับส่งสนามบินและนำเที่ยวทั่วไทย 24 ชม.</title>
    
    <!-- Tailwind CSS Via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f4f6f9; color: #333333; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="bg-[#fbc02d] px-[5%] py-2.5 flex justify-between items-center shadow-md sticky top-0 z-50">
        <a href="#" class="flex items-center gap-3">
            <img src="logo.png" alt="Logo" class="h-[50px] w-auto rounded-full">
            <div class="text-2xl font-bold text-black">Calling <span class="bg-black text-white px-2 rounded">TAXI</span></div>
        </a>
    </header>

    <main class="flex-grow max-w-4xl w-full mx-auto px-4 py-6 space-y-6">
        
        <!-- Booking Channels Section -->
        <section class="bg-white border border-gray-200 rounded-xl p-6 md:p-8 shadow-sm text-center space-y-8">
            <h2 class="text-3xl font-bold text-gray-900">⚡ จองรถด่วน 24 ชั่วโมง ⚡</h2>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                
                <!-- LINE -->
                <div class="bg-gray-50 border border-gray-200 rounded-2xl p-4 shadow-sm space-y-3">
                    <span class="bg-[#06c755] text-white text-xs font-bold px-3 py-1 rounded-full uppercase">LINE Chat</span>
                    <div class="max-w-[160px] w-full mx-auto bg-white p-2 rounded-xl border border-gray-100">
                        <img src="line_qr.png" alt="LINE" class="w-full h-auto rounded-lg">
                    </div>
                    <!-- ข้อความใหญ่ตามบรีฟ -->
                    <div class="text-xl font-black text-red-600">จองรถด่วน</div>
                    <div class="text-sm font-bold text-gray-500">LINE 预订</div>
                    <a href="https://lin.ee/xwb1lQj" target="_blank" class="block w-full bg-[#06c755] text-white font-bold py-2.5 rounded-xl">แอดไลน์จองรถ</a>
                </div>

                <!-- WhatsApp -->
                <div class="bg-gray-50 border border-gray-200 rounded-2xl p-4 shadow-sm space-y-3">
                    <span class="bg-[#25d366] text-white text-xs font-bold px-3 py-1 rounded-full uppercase">WhatsApp</span>
                    <div class="max-w-[160px] w-full mx-auto bg-white p-2 rounded-xl border border-gray-100">
                        <img src="whatsapp.jpg" alt="WhatsApp" class="w-full h-auto rounded-lg">
                    </div>
                    <!-- ข้อความใหญ่ตามบรีฟ -->
                    <div class="text-xl font-black text-red-600">จองรถด่วน</div>
                    <div class="text-sm font-bold text-gray-500">立即车订</div>
                    <a href="https://wa.me/#" target="_blank" class="block w-full bg-[#25d366] text-white font-bold py-2.5 rounded-xl">WhatsApp Chat</a>
                </div>

                <!-- WeChat -->
                <div class="bg-gray-50 border border-gray-200 rounded-2xl p-4 shadow-sm space-y-3">
                    <span class="bg-[#00c300] text-white text-xs font-bold px-3 py-1 rounded-full uppercase">WeChat</span>
                    <div class="max-w-[160px] w-full mx-auto bg-white p-2 rounded-xl border border-gray-100">
                        <img src="wechat.jpg" alt="WeChat" class="w-full h-auto rounded-lg">
                    </div>
                    <!-- ข้อความใหญ่ตามบรีฟ -->
                    <div class="text-xl font-black text-red-600">จองรถด่วน</div>
                    <div class="text-sm font-bold text-gray-500">微信预订</div>
                    <a href="#" target="_blank" class="block w-full bg-[#00c300] text-white font-bold py-2.5 rounded-xl">WeChat Booking</a>
                </div>

            </div>
        </section>

    </main>

    <footer class="bg-[#222222] text-white py-8 text-center">
        <p>&copy; 2026 Calling Taxi Service. All rights reserved.</p>
    </footer>

</body>
</html>
