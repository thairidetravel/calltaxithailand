<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calling Taxi | บริการรถรับส่งสนามบินและนำเที่ยวทั่วไทย 24 ชม.</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Prompt', sans-serif; background-color: #f4f6f9; color: #333333; }</style>
</head>
<body class="min-h-screen flex flex-col justify-between">

    <!-- Header: อยู่แถบเดียวกับชื่อเว็บและปุ่มเปลี่ยนภาษา -->
    <header class="bg-[#fbc02d] px-[5%] py-3 flex justify-between items-center shadow-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="Logo" class="h-[50px] w-auto rounded-full shadow-sm">
            <h1 class="text-xl md:text-2xl font-bold text-black">Calling TAXI</h1>
        </div>
        <select id="langSelect" onchange="changeLanguage(this.value)" class="bg-black text-white px-3 py-1.5 rounded-lg font-bold cursor-pointer hover:bg-gray-800">
            <option value="TH">TH</option>
            <option value="EN">EN</option>
            <option value="CN">中文</option>
        </select>
    </header>

    <main class="flex-grow max-w-4xl w-full mx-auto px-4 py-6 space-y-6">
        
        <!-- Hero Banner -->
        <section class="rounded-xl overflow-hidden shadow-sm bg-white border border-gray-200">
            <img src="menu_01.png" alt="Banner" class="w-full h-auto max-h-[400px] object-cover">
            <div class="p-6 text-center">
                <h2 id="heroTitle" class="text-2xl font-bold text-gray-900">Calling Taxi บริการรถรับส่งเหมารถทั่วไทย</h2>
            </div>
        </section>

        <!-- Booking Channels: จองรถด่วนตัวใหญ่ -->
        <section class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm text-center space-y-6">
            <h3 id="bookingTitle" class="text-2xl font-bold text-gray-900">⚡ จองรถด่วน 24 ชั่วโมง ⚡</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- LINE -->
                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <img src="line_qr.png" class="w-[140px] mx-auto rounded-lg">
                    <div class="text-2xl font-black text-red-600 my-2">จองรถด่วน</div>
                    <div class="text-sm text-gray-500 font-bold mb-3">LINE 预订</div>
                    <a href="https://lin.ee/xwb1lQj" class="block bg-[#06c755] text-white font-bold py-2 rounded-xl">LINE</a>
                </div>
                <!-- WhatsApp -->
                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <img src="whatsapp.jpg" class="w-[140px] mx-auto rounded-lg">
                    <div class="text-2xl font-black text-red-600 my-2">จองรถด่วน</div>
                    <div class="text-sm text-gray-500 font-bold mb-3">立即车订</div>
                    <a href="#" class="block bg-[#25d366] text-white font-bold py-2 rounded-xl">WhatsApp</a>
                </div>
                <!-- WeChat -->
                <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                    <img src="wechat.jpg" class="w-[140px] mx-auto rounded-lg">
                    <div class="text-2xl font-black text-red-600 my-2">จองรถด่วน</div>
                    <div class="text-sm text-gray-500 font-bold mb-3">微信预订</div>
                    <a href="#" class="block bg-[#00c300] text-white font-bold py-2 rounded-xl">WeChat</a>
                </div>
            </div>
        </section>

        <!-- Fleet -->
        <section class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 text-center">
                <img src="altis.png" class="h-32 mx-auto mb-2">
                <h4 id="fleet1" class="font-bold">แท็กซี่ทั่วไป (Sedan)</h4>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 text-center">
                <img src="suv.png" class="h-32 mx-auto mb-2">
                <h4 id="fleet2" class="font-bold">รถยนต์อเนกประสงค์ (SUV)</h4>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 text-center">
                <img src="van_03.png" class="h-32 mx-auto mb-2">
                <h4 id="fleet3" class="font-bold">รถตู้ VIP (Van)</h4>
            </div>
        </section>

        <!-- Banner Footer -->
        <img src="banner728_90.jpg" class="w-full rounded-lg shadow-sm">
    </main>

    <footer class="bg-[#222222] text-white py-6 text-center text-sm">
        &copy; 2026 Calling Taxi Service. All rights reserved.
    </footer>

    <script>
        const content = {
            TH: { hero: "Calling Taxi บริการรถรับส่งเหมารถทั่วไทย", book: "⚡ จองรถด่วน 24 ชั่วโมง ⚡", f1: "แท็กซี่ทั่วไป (Sedan)", f2: "รถยนต์อเนกประสงค์ (SUV)", f3: "รถตู้ VIP (Van)" },
            EN: { hero: "Calling Taxi | Private Thailand Taxi Service", book: "⚡ 24/7 Express Booking ⚡", f1: "Standard Taxi (Sedan)", f2: "SUV Service", f3: "VIP Van Service" },
            CN: { hero: "Calling Taxi 泰国包车接送服务", book: "⚡ 24小时 快速预订 ⚡", f1: "普通出租车 (Sedan)", f2: "SUV 舒适型", f3: "VIP 商务车 (Van)" }
        };

        function changeLanguage(lang) {
            document.getElementById('heroTitle').innerText = content[lang].hero;
            document.getElementById('bookingTitle').innerText = content[lang].book;
            document.getElementById('fleet1').innerText = content[lang].f1;
            document.getElementById('fleet2').innerText = content[lang].f2;
            document.getElementById('fleet3').innerText = content[lang].f3;
        }
    </script>
</body>
</html>
